name: Test and deploy to Hugging Face

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hugging-face-production
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-space.txt

      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.12.1 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements-space.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Check deployment configuration
        run: |
          test -n "$HF_SPACE_ID" || (echo "Missing repository variable HF_SPACE_ID" && exit 1)
          test -n "$HF_TOKEN" || (echo "Missing repository secret HF_TOKEN" && exit 1)

      - name: Check out full Git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push master to Hugging Face Space
        run: |
          git remote add huggingface "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push --force huggingface HEAD:main
